<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Westar Admin - Управление каталогом</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --apex-bg: #051424;
            --apex-container: #0a1f35;
            --apex-border: #1a365d;
            --apex-gold: #d4af37;
            --apex-text: #f8fafc;
        }
        body {
            background-color: var(--apex-bg);
            color: var(--apex-text);
            font-family: 'Inter', sans-serif;
        }
        .hud-border {
            border: 1px solid var(--apex-border);
            background-color: var(--apex-container);
        }
        .btn-gold {
            background-color: rgba(212, 175, 55, 0.1);
            color: var(--apex-gold);
            border: 1px solid var(--apex-gold);
            transition: all 0.3s;
        }
        .btn-gold:hover {
            background-color: rgba(212, 175, 55, 0.2);
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.3);
        }
        .input-field {
            background-color: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--apex-border);
            color: white;
            padding: 0.5rem;
            border-radius: 0.25rem;
            width: 100%;
            outline: none;
        }
        .input-field:focus {
            border-color: var(--apex-gold);
        }
        .hidden { display: none; }
    </style>
</head>
<body class="p-6">
    <header class="flex justify-between items-center mb-8 border-b border-blue-900 pb-4">
        <h1 class="text-2xl font-['Space_Grotesk'] text-[#d4af37]">WESTAR Admin Panel</h1>
        <div>
            <button onclick="openModal()" class="btn-gold px-4 py-2 rounded text-sm font-mono">+ Добавить товар</button>
            <a href="/" class="ml-4 text-blue-400 hover:text-blue-300 underline text-sm">Перейти на сайт</a>
        </div>
    </header>

    <div class="hud-border rounded-lg p-4 overflow-x-auto">
        <table class="w-full text-left border-collapse">
            <thead>
                <tr class="border-b border-blue-900 text-blue-300 font-mono text-sm">
                    <th class="p-3">Артикул</th>
                    <th class="p-3">Название</th>
                    <th class="p-3">Категория</th>
                    <th class="p-3">Цена</th>
                    <th class="p-3">Остаток</th>
                    <th class="p-3">Действия</th>
                </tr>
            </thead>
            <tbody id="productsTableBody">
                <tr><td colspan="6" class="text-center p-8 text-gray-400">Загрузка...</td></tr>
            </tbody>
        </table>
    </div>

    <!-- Модальное окно редактирования -->
    <div id="productModal" class="fixed inset-0 bg-black/80 hidden items-center justify-center z-50 p-4 overflow-y-auto">
        <div class="hud-border rounded-lg p-6 w-full max-w-3xl my-8">
            <h2 id="modalTitle" class="text-xl font-['Space_Grotesk'] text-[#d4af37] mb-6">Добавить/Редактировать товар</h2>
            <form id="productForm" onsubmit="saveProduct(event)">
                <input type="hidden" id="productId">
                
                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="block text-xs text-blue-300 mb-1 font-mono uppercase">Артикул *</label>
                        <input type="text" id="p_article" required class="input-field">
                    </div>
                    <div>
                        <label class="block text-xs text-blue-300 mb-1 font-mono uppercase">Бренд</label>
                        <input type="text" id="p_brand" class="input-field" placeholder="Например: Acura">
                    </div>
                </div>

                <div class="mb-4">
                    <label class="block text-xs text-blue-300 mb-1 font-mono uppercase">Название *</label>
                    <input type="text" id="p_name" required class="input-field">
                </div>

                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="block text-xs text-blue-300 mb-1 font-mono uppercase">Категория *</label>
                        <input type="text" id="p_category" required class="input-field" placeholder="Двигатель">
                    </div>
                    <div>
                        <label class="block text-xs text-blue-300 mb-1 font-mono uppercase">OEM / Кросс-номера</label>
                        <input type="text" id="p_oem" class="input-field">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="block text-xs text-blue-300 mb-1 font-mono uppercase">Цена (₽) *</label>
                        <input type="number" id="p_price" required class="input-field">
                    </div>
                    <div>
                        <label class="block text-xs text-blue-300 mb-1 font-mono uppercase">Остаток *</label>
                        <input type="number" id="p_stock" required class="input-field">
                    </div>
                </div>
                
                <div class="mb-4">
                    <label class="block text-xs text-blue-300 mb-1 font-mono uppercase">Главное Изображение</label>
                    <div class="flex gap-4 items-center">
                        <div id="imagePreviewContainer" class="w-20 h-20 bg-black/40 border border-blue-900 flex items-center justify-center rounded overflow-hidden">
                            <img id="imagePreview" src="" alt="Preview" class="max-w-full max-h-full object-contain hidden">
                            <span id="imagePreviewPlaceholder" class="text-xs text-gray-500">Нет фото</span>
                        </div>
                        <div class="flex-1">
                            <input type="file" id="imageUpload" accept="image/*" class="input-field mb-2 text-sm" onchange="uploadImage(event)">
                            <input type="url" id="p_imageUrl" class="input-field text-sm" placeholder="Или вставьте прямую ссылку (https://...)">
                            <div id="uploadSpinner" class="hidden text-xs text-blue-400 mt-1 animate-pulse">Загрузка изображения...</div>
                        </div>
                    </div>
                </div>

                <div class="mb-6">
                    <label class="block text-xs text-blue-300 mb-1 font-mono uppercase">Описание</label>
                    <textarea id="p_description" class="input-field h-24"></textarea>
                </div>

                <div class="mb-6">
                    <label class="block text-xs text-blue-300 mb-1 font-mono uppercase">Совместимость (JSON формат)</label>
                    <textarea id="p_compatibility" class="input-field h-32 font-mono text-sm" placeholder='[{"make": "Acura", "model": "MDX", "years": "2010-2015"}]'></textarea>
                </div>

                <div class="flex justify-end gap-3 pt-4 border-t border-blue-900">
                    <button type="button" onclick="closeModal()" class="px-4 py-2 border border-blue-900 rounded text-sm hover:bg-blue-900/50 transition">Отмена</button>
                    <button type="submit" class="btn-gold px-6 py-2 rounded text-sm font-semibold flex items-center gap-2">
                        <span id="saveSpinner" class="hidden animate-spin w-4 h-4 border-2 border-current border-t-transparent rounded-full"></span>
                        Сохранить
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script>
        let catalog = { products: [] };
        let currentProduct = null;

        const loadData = async () => {
            try {
                const res = await fetch('/api/catalog');
                catalog = await res.json();
                renderTable();
            } catch (e) {
                alert('Ошибка загрузки данных');
                console.error(e);
            }
        };

        const renderTable = () => {
            const tbody = document.getElementById('productsTableBody');
            if (!catalog.products.length) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center p-8 text-gray-400">Нет товаров</td></tr>';
                return;
            }

            tbody.innerHTML = catalog.products.map(p => `
                <tr class="border-b border-blue-900/50 hover:bg-blue-900/20 transition">
                    <td class="p-3 font-mono text-[#d4af37] text-sm">${p.article || '-'}</td>
                    <td class="p-3 text-sm">${p.name}</td>
                    <td class="p-3 text-xs text-gray-300">${p.category}</td>
                    <td class="p-3 font-semibold text-sm">${p.price} ₽</td>
                    <td class="p-3">
                        <span class="px-2 py-1 rounded text-xs ${p.stock > 0 ? 'bg-green-900/30 text-green-400' : 'bg-red-900/30 text-red-400'}">
                            ${p.stock > 0 ? p.stock + ' шт' : 'Нет'}
                        </span>
                    </td>
                    <td class="p-3 flex gap-2">
                        <button onclick="editProduct('${p.id}')" class="text-blue-400 hover:text-blue-300 p-1">✎</button>
                        <button onclick="deleteProduct('${p.id}')" class="text-red-400 hover:text-red-300 p-1">🗑</button>
                    </td>
                </tr>
            `).join('');
        };

        const openModal = (product = null) => {
            currentProduct = product;
            document.getElementById('modalTitle').textContent = product ? 'Редактировать товар' : 'Новый товар';
            
            document.getElementById('productId').value = product ? product.id : '';
            document.getElementById('p_article').value = product?.article || '';
            document.getElementById('p_brand').value = product?.brand || '';
            document.getElementById('p_name').value = product?.name || '';
            document.getElementById('p_category').value = product?.category || '';
            document.getElementById('p_oem').value = product?.oem || '';
            document.getElementById('p_price').value = product?.price || 0;
            document.getElementById('p_stock').value = product?.stock || 0;
            
            const imgUrl = product?.imageUrl || '';
            document.getElementById('p_imageUrl').value = imgUrl;
            document.getElementById('imageUpload').value = '';
            
            const preview = document.getElementById('imagePreview');
            const placeholder = document.getElementById('imagePreviewPlaceholder');
            
            if (imgUrl) {
                preview.src = imgUrl;
                preview.classList.remove('hidden');
                placeholder.classList.add('hidden');
            } else {
                preview.src = '';
                preview.classList.add('hidden');
                placeholder.classList.remove('hidden');
            }
            document.getElementById('p_description').value = product?.description || '';
            
            let compatStr = '';
            if (product?.compatibility) {
                compatStr = JSON.stringify(product.compatibility, null, 2);
            }
            document.getElementById('p_compatibility').value = compatStr;

            const modal = document.getElementById('productModal');
            modal.classList.remove('hidden');
            modal.classList.add('flex');
            document.body.style.overflow = 'hidden';
        };

        const closeModal = () => {
            const modal = document.getElementById('productModal');
            modal.classList.add('hidden');
            modal.classList.remove('flex');
            document.body.style.overflow = '';
        };

        const uploadImage = async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const spinner = document.getElementById('uploadSpinner');
            spinner.classList.remove('hidden');

            const formData = new FormData();
            formData.append('image', file);

            try {
                const res = await fetch('/api/upload', {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                
                if (data.imageUrl) {
                    document.getElementById('p_imageUrl').value = data.imageUrl;
                    const preview = document.getElementById('imagePreview');
                    const placeholder = document.getElementById('imagePreviewPlaceholder');
                    preview.src = data.imageUrl;
                    preview.classList.remove('hidden');
                    placeholder.classList.add('hidden');
                } else {
                    alert('Ошибка при загрузке: ' + (data.error || 'неизвестная ошибка'));
                }
            } catch (err) {
                console.error(err);
                alert('Сбой при загрузке файла');
            } finally {
                spinner.classList.add('hidden');
            }
        };

        const saveProduct = async (e) => {
            e.preventDefault();
            const spinner = document.getElementById('saveSpinner');
            spinner.classList.remove('hidden');

            const id = document.getElementById('productId').value;
            
            let compatibility = [];
            try {
                const cVal = document.getElementById('p_compatibility').value.trim();
                if (cVal) compatibility = JSON.parse(cVal);
            } catch(err) {
                alert('Ошибка в JSON совместимости!');
                spinner.classList.add('hidden');
                return;
            }

            const data = {
                article: document.getElementById('p_article').value,
                brand: document.getElementById('p_brand').value,
                name: document.getElementById('p_name').value,
                category: document.getElementById('p_category').value,
                oem: document.getElementById('p_oem').value,
                price: Number(document.getElementById('p_price').value),
                stock: Number(document.getElementById('p_stock').value),
                imageUrl: document.getElementById('p_imageUrl').value,
                description: document.getElementById('p_description').value,
                compatibility
            };

            const method = id ? 'PUT' : 'POST';
            const url = id ? `/api/products/${id}` : `/api/products`;

            try {
                await fetch(url, {
                    method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                closeModal();
                loadData();
            } catch (err) {
                alert('Ошибка сохранения');
            } finally {
                spinner.classList.add('hidden');
            }
        };

        const deleteProduct = async (id) => {
            if (!confirm('Точно удалить этот товар?')) return;
            try {
                await fetch(`/api/products/${id}`, { method: 'DELETE' });
                loadData();
            } catch (e) {
                alert('Ошибка удаления');
            }
        };

        // Initialize
        loadData();
    </script>
</body>
</html>
