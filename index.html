<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Westar - Cyber Catalog</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { 
                        sans: ['Inter', 'sans-serif'],
                        space: ['Space Grotesk', 'sans-serif']
                    },
                    colors: {
                        cyber: {
                            dark: '#050b1a',
                            panel: 'rgba(12, 19, 34, 0.8)',
                            cyan: '#00d4ff',
                            blue: '#3b82f6'
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="antialiased min-h-screen flex flex-col relative text-slate-300">

    <!-- Animated Starfield Background -->
    <div class="starfield-bg">
        <div class="stars"></div>
        <div class="stars2"></div>
        <div class="stars3"></div>
    </div>

    <!-- Header -->
    <header class="cyber-glass sticky top-0 z-50 border-b border-cyan-900/30">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-20">
                <div class="flex items-center gap-4 group cursor-pointer" onclick="window.location.reload()">
                    <div class="w-12 h-12 rounded-xl bg-cyber-dark border border-cyan-500/30 flex items-center justify-center shadow-[0_0_15px_rgba(0,212,255,0.2)] group-hover:border-cyan-400 group-hover:shadow-[0_0_20px_rgba(0,212,255,0.5)] transition-all duration-300">
                        <span class="text-2xl font-black text-cyan-400 font-space">W</span>
                    </div>
                    <div class="scanning-text-container">
                        <h1 class="text-2xl font-bold tracking-wider text-white font-space">WESTAR<span class="text-cyan-glow">.</span></h1>
                        <p class="text-[0.65rem] font-mono text-cyan-500/70 uppercase tracking-[0.2em]">Cyber Catalog System</p>
                        <div class="scanning-line"></div>
                    </div>
                </div>
                <div class="hidden md:flex items-center gap-4">
                    <div class="relative group">
                        <input type="text" id="searchInput" placeholder="Поиск по артикулу (напр. EM-7148)..." class="cyber-input w-[400px] text-sm rounded-lg block pl-10 p-3 font-mono placeholder-cyan-900/50">
                        <div class="absolute inset-y-0 left-0 flex items-center pl-3 pointer-events-none">
                            <svg class="w-5 h-5 text-cyan-600 group-focus-within:text-cyan-400 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                        </div>
                    </div>
                    <button id="cartBtn" class="relative w-12 h-12 flex items-center justify-center cyber-glass rounded-xl text-cyan-500 hover:text-cyan-300 transition-all border border-cyan-500/30 hover:border-cyan-400 hover:shadow-[0_0_15px_rgba(0,212,255,0.4)]">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                        <span id="cartBadge" class="absolute -top-2 -right-2 bg-cyan-500 text-cyber-dark text-[10px] font-bold px-2 py-0.5 rounded-full shadow-[0_0_10px_rgba(0,212,255,0.8)] hidden">0</span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- Main Content -->
    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full flex flex-col lg:flex-row gap-8">
        
        <!-- Sidebar Filters -->
        <aside class="w-full lg:w-72 flex-shrink-0">
            <div class="cyber-glass rounded-2xl p-6 sticky top-28 border border-cyan-900/30">
                <div class="flex items-center justify-between mb-6">
                    <h2 class="text-lg font-bold text-white font-space tracking-wider">Терминал</h2>
                    <button id="resetFiltersBtn" class="text-xs font-mono text-cyan-500 hover:text-cyan-300 transition-colors uppercase tracking-widest">Сброс</button>
                </div>
                
                <div class="space-y-6">
                    <!-- Categories -->
                    <div>
                        <h3 class="text-xs font-mono text-cyan-600 mb-4 flex items-center gap-2 uppercase tracking-widest">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 10h16M4 14h16M4 18h16"></path></svg>
                            Системы
                        </h3>
                        <div id="categoryFilters" class="space-y-3">
                            <!-- Checkboxes injected by JS -->
                        </div>
                    </div>
                    
                    <div class="border-t border-cyan-900/30"></div>
                    
                    <!-- Vehicle Search -->
                    <div>
                        <h3 class="text-xs font-mono text-cyan-600 mb-4 flex items-center gap-2 uppercase tracking-widest">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7h12m0 0l-4-4m4 4l-4 4m0 6H4m0 0l4 4m-4-4l4-4"></path></svg>
                            Калибровка
                        </h3>
                        <div class="space-y-4">
                            <div>
                                <label class="text-[10px] font-mono text-cyan-500/70 uppercase mb-1.5 block">Марка</label>
                                <select id="vehicleMake" class="cyber-input w-full text-sm rounded-lg p-2.5 cursor-pointer">
                                    <option value="">Все марки</option>
                                </select>
                            </div>
                            <div>
                                <label class="text-[10px] font-mono text-cyan-500/70 uppercase mb-1.5 block">Модель</label>
                                <select id="vehicleModel" disabled class="cyber-input w-full text-sm rounded-lg p-2.5 cursor-pointer disabled:opacity-30">
                                    <option value="">Все модели</option>
                                </select>
                            </div>
                            <div>
                                <label class="text-[10px] font-mono text-cyan-500/70 uppercase mb-1.5 block">Год выпуска</label>
                                <select id="vehicleYear" disabled class="cyber-input w-full text-sm rounded-lg p-2.5 cursor-pointer disabled:opacity-30">
                                    <option value="">Любой год</option>
                                </select>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Product Grid & Brands -->
        <section class="flex-grow min-w-0">
            <!-- Brand Grid -->
            <div class="mb-10">
                <h2 class="text-xl font-space font-bold text-white mb-6 flex items-center gap-3">
                    <span class="text-cyan-glow uppercase tracking-wider">Производители</span>
                </h2>
                <div id="brandGrid" class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 lg:grid-cols-6 gap-4">
                    <!-- Brands injected by JS -->
                </div>
            </div>

            <div class="cyber-glass rounded-2xl p-4 mb-6 flex flex-col sm:flex-row sm:justify-between sm:items-center gap-4 border border-cyan-900/30">
                <div>
                    <h2 class="text-xl font-bold text-white font-space mb-1 uppercase tracking-wider">База Данных</h2>
                    <p class="text-xs font-mono text-cyan-500" id="resultsCount">Синхронизация...</p>
                </div>
                <div class="flex items-center gap-3">
                    <label for="sortSelect" class="text-xs font-mono text-cyan-600 uppercase tracking-widest">Сортировка</label>
                    <select id="sortSelect" class="cyber-input text-sm rounded-lg p-2 cursor-pointer">
                        <option value="default">Стандарт</option>
                        <option value="price_asc">Цена: Ниже</option>
                        <option value="price_desc">Цена: Выше</option>
                        <option value="stock_desc">Наличие</option>
                    </select>
                </div>
            </div>

            <!-- Mobile search -->
            <div class="md:hidden mb-6">
                <div class="relative">
                    <input type="text" id="searchInputMobile" placeholder="Поиск по артикулу..." class="cyber-input w-full text-sm rounded-xl pl-10 p-4">
                    <div class="absolute inset-y-0 left-0 flex items-center pl-4 pointer-events-none">
                        <svg class="w-5 h-5 text-cyan-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                    </div>
                </div>
            </div>

            <div id="productsGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-2 xl:grid-cols-3 gap-6">
                <!-- Products injected by JS -->
            </div>
            
            <div id="emptyState" class="hidden cyber-glass rounded-2xl flex-col items-center justify-center py-20 text-center mt-6 border border-cyan-900/30">
                <div class="w-24 h-24 rounded-full flex items-center justify-center mb-6 border border-cyan-500/30 shadow-[0_0_20px_rgba(0,212,255,0.2)]">
                    <svg class="w-12 h-12 text-cyan-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                </div>
                <h3 class="text-2xl font-bold text-white font-space tracking-wider mb-2 text-cyan-glow">ДАННЫЕ НЕ НАЙДЕНЫ</h3>
                <p class="text-slate-400 font-mono text-sm max-w-md mx-auto mb-8">Запрос не дал результатов. Измените параметры сканирования.</p>
                <button id="clearSearchBtn" class="cyber-btn px-8 py-3 rounded-lg shadow-[0_0_15px_rgba(0,212,255,0.3)]">Сброс систем</button>
            </div>
        </section>
    </main>

    <!-- Footer -->
    <footer class="border-t border-cyan-900/30 mt-auto cyber-glass">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-2">
                <span class="text-white font-space font-bold tracking-widest text-lg">WESTAR<span class="text-cyan-500">.</span></span>
            </div>
            <p class="text-cyan-600/60 font-mono text-xs uppercase tracking-widest">© 2026 СИСТЕМА ТОЧНОЙ ИНЖЕНЕРИИ. ИНТЕРФЕЙС ROM.</p>
        </div>
    </footer>

    <!-- Product Modal -->
    <div id="productModal" class="fixed inset-0 z-[100] hidden">
        <div class="absolute inset-0 bg-black/70 backdrop-blur-md transition-opacity" id="modalBackdrop"></div>
        <div class="flex items-center justify-center min-h-screen px-4 pt-4 pb-20 text-center sm:p-0">
            <div class="cyber-glass relative rounded-2xl text-left overflow-hidden shadow-[0_0_40px_rgba(0,212,255,0.15)] transform transition-all sm:my-8 sm:max-w-5xl w-full border border-cyan-500/30 max-h-[90vh] flex flex-col">
                <div class="absolute top-0 right-0 pt-4 pr-4 z-20">
                    <button id="closeModalBtn" type="button" class="text-cyan-500 bg-cyber-dark/80 border border-cyan-500/30 hover:bg-cyan-900/50 hover:text-cyan-300 rounded-lg p-2 transition-all shadow-sm">
                        <svg class="h-5 w-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" /></svg>
                    </button>
                </div>
                <div class="flex-grow overflow-y-auto flex flex-col md:flex-row relative" id="modalContent">
                    <!-- Injected by JS -->
                </div>
            </div>
        </div>
    </div>

    <!-- Cart Drawer -->
    <div id="cartDrawer" class="fixed inset-y-0 right-0 z-[110] w-full md:w-[450px] cyber-glass shadow-[0_0_30px_rgba(0,212,255,0.1)] transform translate-x-full transition-transform duration-300 flex flex-col border-l border-cyan-500/30">
        <div class="p-6 border-b border-cyan-900/30 flex justify-between items-center bg-cyber-dark/50">
            <h2 class="text-xl font-bold text-white font-space tracking-wider flex items-center gap-3">
                <svg class="w-6 h-6 text-cyan-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"></path></svg>
                Модуль Корзины
            </h2>
            <button id="closeCartBtn" class="text-cyan-600 hover:text-cyan-400 p-2 rounded-lg hover:bg-cyan-900/30 transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
        </div>
        <div class="flex-grow overflow-y-auto p-6 space-y-4" id="cartItems">
            <!-- Cart items injected here -->
        </div>
        <div class="p-6 border-t border-cyan-900/30 bg-cyber-dark/50">
            <div class="flex justify-between items-center mb-6">
                <span class="text-cyan-600 font-mono text-sm uppercase tracking-widest">Итого:</span>
                <span id="cartTotal" class="text-2xl font-black text-white font-space tracking-wider">0 ₽</span>
            </div>
            <button id="checkoutBtn" class="w-full py-4 cyber-btn rounded-xl shadow-[0_0_15px_rgba(0,212,255,0.4)] text-lg flex justify-center items-center gap-2">
                Оформить Заказ
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
            </button>
        </div>
    </div>
    <!-- Cart Backdrop -->
    <div id="cartBackdrop" class="fixed inset-0 bg-black/70 backdrop-blur-sm z-[105] hidden transition-opacity"></div>

    <!-- Scripts -->
    <script src="data/catalog.js"></script>
    <script src="app.js"></script>
</body>
</html>
