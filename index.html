<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Westar — Каталог Автозапчастей</title>
    <meta name="description" content="Официальный каталог запасных частей Westar. Подушки и опоры двигателя для американских автомобилей.">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace']
                    },
                    colors: {
                        apex: {
                            bg:        '#050505',
                            surface:   '#0f0f0f',
                            container: '#1a1a1a',
                            border:    '#2a2a2a',
                            text:      '#f5f5f5',
                            muted:     '#888888',
                            gold:      '#d4af37',
                            silver:    '#c0c0c0'
                        }
                    }
                }
            }
        }
    </script>
</head>
<body class="antialiased min-h-screen flex flex-col text-apex-text bg-apex-bg font-sans">

    <!-- Декоративный фон -->
    <div class="apex-bg-grid" aria-hidden="true"></div>
    <div class="apex-bg-radial" aria-hidden="true"></div>

    <!-- ================================================================
         ХЕДЕР
         ================================================================ -->
    <header class="site-header sticky top-0 z-50">
        <div class="max-w-[1440px] mx-auto px-6 lg:px-16">
            <div class="flex items-center justify-between h-20">
                <!-- Логотип -->
                <div class="flex items-center gap-4 cursor-pointer select-none" onclick="window.location.reload()">
                    <!-- Иконка-ромб с буквой W -->
                    <div class="relative w-9 h-9 flex items-center justify-center">
                        <div class="absolute inset-0 rotate-45 border border-apex-gold opacity-60"></div>
                        <span class="text-apex-gold font-bold text-sm font-mono relative z-10">W</span>
                    </div>
                    <div class="flex flex-col leading-none">
                        <span class="text-2xl font-bold tracking-[0.25em] text-apex-text uppercase">WESTAR</span>
                        <span class="text-[8px] font-mono text-apex-gold uppercase tracking-[0.4em] mt-0.5 opacity-80">Precision Components</span>
                    </div>
                </div>

                <!-- Поиск (десктоп) -->
                <div class="hidden md:flex items-center gap-8">
                    <div class="relative group">
                        <input type="text" id="searchInput"
                            placeholder="Поиск по артикулу, названию, OEM..."
                            class="w-72 text-xs bg-transparent border-b border-apex-border pb-2 text-apex-text focus:border-apex-gold focus:outline-none transition-colors placeholder-apex-muted font-mono">
                        <div class="absolute right-0 top-0 text-apex-muted group-focus-within:text-apex-gold transition-colors pointer-events-none">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                        </div>
                    </div>
                    <!-- Кнопка корзины -->
                    <button id="cartBtn" class="relative flex items-center gap-2 text-xs font-mono text-apex-muted hover:text-apex-gold transition-colors uppercase tracking-[0.15em]">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
                        <span>Корзина</span>
                        <span id="cartBadge" class="absolute -top-2 -right-3 bg-apex-gold text-apex-bg text-[9px] font-bold px-1.5 py-0.5 rounded-full hidden leading-none">0</span>
                    </button>
                </div>
            </div>
        </div>
    </header>

    <!-- ================================================================
         ГЛАВНЫЙ КОНТЕНТ
         ================================================================ -->
    <main class="flex-grow max-w-[1440px] mx-auto px-6 lg:px-16 py-12 w-full flex flex-col lg:flex-row gap-12">

        <!-- Боковая панель фильтров -->
        <aside class="w-full lg:w-60 flex-shrink-0">
            <div class="sticky top-28">
                <div class="flex items-center justify-between mb-8 pb-4 border-b border-apex-border">
                    <span class="text-[10px] font-mono text-apex-text uppercase tracking-[0.25em]">Фильтры</span>
                    <button id="resetFiltersBtn" class="text-[9px] font-mono text-apex-muted hover:text-apex-gold transition-colors uppercase tracking-widest">Сброс</button>
                </div>

                <div class="space-y-10">
                    <!-- Категории -->
                    <div>
                        <h3 class="text-[9px] font-mono text-apex-silver mb-4 uppercase tracking-[0.2em] opacity-70">Категория</h3>
                        <div id="categoryFilters" class="space-y-1">
                            <!-- Injected by JS -->
                        </div>
                    </div>

                    <!-- Fitment / Совместимость -->
                    <div>
                        <h3 class="text-[9px] font-mono text-apex-silver mb-4 uppercase tracking-[0.2em] opacity-70">Совместимость</h3>
                        <div class="space-y-3">
                            <div class="relative">
                                <select id="vehicleMake" class="appearance-none w-full text-[11px] bg-apex-surface border border-apex-border text-apex-text py-3 px-4 font-mono focus:border-apex-gold focus:outline-none cursor-pointer transition-colors rounded-none">
                                    <option value="">Марка: Все</option>
                                </select>
                                <div class="absolute inset-y-0 right-3 flex items-center pointer-events-none text-apex-muted">
                                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
                                </div>
                            </div>
                            <div class="relative">
                                <select id="vehicleModel" disabled class="appearance-none w-full text-[11px] bg-apex-surface border border-apex-border text-apex-text py-3 px-4 font-mono focus:border-apex-gold focus:outline-none cursor-pointer disabled:opacity-30 transition-colors rounded-none">
                                    <option value="">Модель: Все</option>
                                </select>
                                <div class="absolute inset-y-0 right-3 flex items-center pointer-events-none text-apex-muted">
                                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
                                </div>
                            </div>
                            <div class="relative">
                                <select id="vehicleYear" disabled class="appearance-none w-full text-[11px] bg-apex-surface border border-apex-border text-apex-text py-3 px-4 font-mono focus:border-apex-gold focus:outline-none cursor-pointer disabled:opacity-30 transition-colors rounded-none">
                                    <option value="">Год: Любой</option>
                                </select>
                                <div class="absolute inset-y-0 right-3 flex items-center pointer-events-none text-apex-muted">
                                    <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </aside>

        <!-- Основная секция с товарами -->
        <section class="flex-grow min-w-0">

            <!-- Бренд-грид -->
            <div class="mb-12">
                <div class="flex items-center gap-3 mb-5">
                    <div class="h-px flex-grow bg-gradient-to-r from-apex-border to-transparent"></div>
                    <span class="text-[9px] font-mono text-apex-muted uppercase tracking-[0.3em]">Производитель</span>
                    <div class="h-px flex-grow bg-gradient-to-l from-apex-border to-transparent"></div>
                </div>
                <div id="brandGrid" class="grid grid-cols-4 md:grid-cols-6 xl:grid-cols-8 gap-2">
                    <!-- Injected by JS -->
                </div>
            </div>

            <!-- Заголовок результатов + сортировка -->
            <div class="mb-8 flex flex-col sm:flex-row sm:justify-between sm:items-end gap-4 border-b border-apex-border pb-5">
                <div>
                    <h2 class="text-2xl font-light text-apex-text tracking-tight mb-1">Каталог запчастей</h2>
                    <p class="text-[10px] font-mono text-apex-muted uppercase tracking-widest" id="resultsCount">Загрузка...</p>
                </div>
                <div class="flex items-center gap-3">
                    <label for="sortSelect" class="text-[9px] font-mono text-apex-muted uppercase tracking-[0.2em]">Сортировка</label>
                    <select id="sortSelect" class="bg-transparent border-b border-apex-border text-apex-text text-xs font-mono py-1 focus:ring-0 focus:border-apex-gold cursor-pointer uppercase tracking-widest outline-none transition-colors">
                        <option value="default" class="bg-apex-container">По умолчанию</option>
                        <option value="price_asc" class="bg-apex-container">Цена ↑</option>
                        <option value="price_desc" class="bg-apex-container">Цена ↓</option>
                        <option value="stock_desc" class="bg-apex-container">В наличии</option>
                    </select>
                </div>
            </div>

            <!-- Мобильный поиск -->
            <div class="md:hidden mb-8">
                <div class="relative">
                    <input type="text" id="searchInputMobile"
                        placeholder="Поиск..."
                        class="w-full text-sm bg-transparent border-b border-apex-border pb-3 text-apex-text focus:border-apex-gold focus:outline-none transition-colors placeholder-apex-muted font-mono">
                    <div class="absolute right-0 inset-y-0 flex items-start pt-0.5 pointer-events-none">
                        <svg class="w-4 h-4 text-apex-muted" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                    </div>
                </div>
            </div>

            <!-- Грид товаров -->
            <div id="productsGrid" class="grid grid-cols-1 md:grid-cols-2 2xl:grid-cols-3 gap-6">
                <!-- Injected by JS -->
            </div>

            <!-- Пустое состояние -->
            <div id="emptyState" class="hidden flex-col items-center justify-center py-32 text-center border border-apex-border bg-apex-surface mt-4">
                <div class="w-16 h-16 border border-apex-border flex items-center justify-center mb-6 rotate-45">
                    <svg class="w-6 h-6 -rotate-45 text-apex-muted" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
                </div>
                <h3 class="text-base font-light text-apex-text tracking-widest mb-2 uppercase">Ничего не найдено</h3>
                <p class="text-apex-muted font-mono text-[11px] max-w-sm mx-auto mb-8 leading-relaxed">Измените параметры фильтрации или сбросьте поиск.</p>
                <button id="clearSearchBtn" class="border border-apex-border text-apex-text hover:border-apex-gold hover:text-apex-gold transition-colors font-mono text-[10px] uppercase tracking-[0.2em] px-8 py-3">
                    Сбросить фильтры
                </button>
            </div>
        </section>
    </main>

    <!-- ================================================================
         ФУТЕР
         ================================================================ -->
    <footer class="border-t border-apex-border bg-apex-surface mt-auto">
        <div class="max-w-[1440px] mx-auto px-6 lg:px-16 py-10 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-3">
                <div class="relative w-6 h-6 flex items-center justify-center">
                    <div class="absolute inset-0 rotate-45 border border-apex-gold opacity-40"></div>
                    <span class="text-apex-gold font-bold text-[9px] font-mono relative z-10">W</span>
                </div>
                <span class="text-apex-text font-bold tracking-[0.25em] text-sm uppercase">WESTAR</span>
            </div>
            <p class="text-apex-muted font-mono text-[9px] uppercase tracking-[0.3em]">© 2026 Westar Precision Engineering. Все права защищены.</p>
        </div>
    </footer>

    <!-- ================================================================
         МОДАЛЬНОЕ ОКНО ТОВАРА
         ================================================================ -->
    <div id="productModal" class="fixed inset-0 z-[100] hidden">
        <div class="absolute inset-0 bg-apex-bg/95 backdrop-blur-xl" id="modalBackdrop"></div>
        <div class="flex items-center justify-center min-h-screen px-4 py-8">
            <div class="relative bg-apex-surface text-left overflow-hidden w-full max-w-6xl border border-apex-border max-h-[90vh] flex flex-col">
                <!-- Угловые декораторы модалки -->
                <div class="absolute top-3 left-3 w-4 h-4 border-t border-l border-apex-gold opacity-60 z-20 pointer-events-none"></div>
                <div class="absolute top-3 right-3 w-4 h-4 border-t border-r border-apex-gold opacity-60 z-20 pointer-events-none"></div>
                <div class="absolute bottom-3 left-3 w-4 h-4 border-b border-l border-apex-gold opacity-60 z-20 pointer-events-none"></div>
                <div class="absolute bottom-3 right-3 w-4 h-4 border-b border-r border-apex-gold opacity-60 z-20 pointer-events-none"></div>

                <button id="closeModalBtn" type="button" class="absolute top-5 right-5 z-30 text-apex-muted hover:text-apex-gold transition-colors p-2">
                    <svg class="h-7 w-7" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M6 18L18 6M6 6l12 12"/></svg>
                </button>
                <div class="flex-grow overflow-hidden" id="modalContent">
                    <!-- Заполняется JS -->
                </div>
            </div>
        </div>
    </div>

    <!-- ================================================================
         КОРЗИНА (DRAWER)
         ================================================================ -->
    <div id="cartDrawer" class="fixed inset-y-0 right-0 z-[110] w-full md:w-[440px] flex flex-col transform translate-x-full transition-transform duration-500 ease-[cubic-bezier(0.16,1,0.3,1)]">
        <!-- Шапка корзины -->
        <div class="p-6 border-b border-apex-border flex justify-between items-center bg-apex-surface">
            <div class="flex items-center gap-3">
                <svg class="w-4 h-4 text-apex-gold" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
                <h2 class="text-[10px] font-mono text-apex-text uppercase tracking-[0.25em]">Корзина</h2>
            </div>
            <button id="closeCartBtn" class="text-apex-muted hover:text-apex-gold p-2 transition-colors">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M6 18L18 6M6 6l12 12"/></svg>
            </button>
        </div>
        <!-- Список товаров -->
        <div class="flex-grow overflow-y-auto p-6 space-y-3 custom-scrollbar bg-apex-surface" id="cartItems">
            <!-- Injected by JS -->
        </div>
        <!-- Итог + оформление -->
        <div class="p-6 border-t border-apex-border bg-apex-container">
            <div class="flex justify-between items-baseline mb-6">
                <span class="text-apex-muted font-mono text-[9px] uppercase tracking-[0.2em]">Итого</span>
                <span id="cartTotal" class="text-2xl font-light text-apex-text tracking-tight">0 ₽</span>
            </div>
            <button id="checkoutBtn" class="w-full py-4 bg-apex-gold text-apex-bg hover:bg-yellow-400 transition-colors font-mono uppercase tracking-[0.2em] text-xs font-semibold">
                Оформить заказ
            </button>
        </div>
    </div>
    <!-- Фон-backdrop корзины -->
    <div id="cartBackdrop" class="fixed inset-0 bg-black/60 backdrop-blur-sm z-[105] hidden"></div>

    <!-- ================================================================
         СКРИПТЫ
         ================================================================ -->
    <script src="data/catalog.js"></script>
    <script src="app.js"></script>
</body>
</html>
