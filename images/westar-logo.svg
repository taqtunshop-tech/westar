<svg viewBox="0 0 400 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="neonGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00f2ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0077ff;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Sleek Typographic Logo -->
  <text x="10" y="70" font-family="Inter, sans-serif" font-weight="900" font-size="60" fill="white" letter-spacing="4">WESTAR</text>
  <!-- Automotive Element (Stylized Gear/Wheel Fragment) -->
  <path d="M310 50 A40 40 0 0 1 350 10 L350 25 A25 25 0 0 0 325 50 Z" fill="url(#neonGrad)" filter="url(#glow)" />
  <path d="M310 50 A40 40 0 0 0 350 90 L350 75 A25 25 0 0 1 325 50 Z" fill="url(#neonGrad)" filter="url(#glow)" />
  <rect x="345" y="45" width="40" height="10" rx="5" fill="url(#neonGrad)" filter="url(#glow)" />
